services:
  qwen-sglang:
    image: lmsysorg/sglang:latest
    container_name: qwen-sglang
    networks:
      - price-net
    ports:
      - "30000:30000"
    gpus: all
    ipc: host
    shm_size: "32gb"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - type: bind
        source: ${USERPROFILE}/.cache/huggingface
        target: /root/.cache/huggingface
    command: >
      python3 -m sglang.launch_server
      --model-path Vishva007/Qwen3-VL-8B-Instruct-W4A16-AutoRound-AWQ
      --host 0.0.0.0
      --port 30000
      --trust-remote-code
      --grammar-backend xgrammar
      --context-length 4096
      --mem-fraction-static 0.80

networks:
  price-net:
    external: true
